name: FSD Fullstack CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  DOCKER_HUB_USERNAME: ${{ secrets.DOCKER_HUB_USERNAME }}
  DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN }}

jobs:
  test-and-build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fsd_experiments/exp10/backend
    steps:
    - uses: actions/checkout@v3
    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run Tests and Build
      run: mvn clean package

  test-and-build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./fsd_experiments/exp10/frontend
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: ./fsd_experiments/exp10/frontend/package-lock.json
    - name: Install dependencies
      run: npm ci
    - name: Run Tests
      run: npm run test --if-present
    - name: Build
      run: npm run build

  docker-publish:
    needs: [test-and-build-backend, test-and-build-frontend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - uses: actions/checkout@v3
    
    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ env.DOCKER_HUB_USERNAME }}
        password: ${{ env.DOCKER_HUB_TOKEN }}
        
    - name: Build and push Backend Image
      uses: docker/build-push-action@v4
      with:
        context: ./fsd_experiments/exp10/backend
        push: true
        tags: ${{ env.DOCKER_HUB_USERNAME }}/fsd-backend:latest
        
    - name: Build and push Frontend Image
      uses: docker/build-push-action@v4
      with:
        context: ./fsd_experiments/exp10/frontend
        push: true
        tags: ${{ env.DOCKER_HUB_USERNAME }}/fsd-frontend:latest

  deploy-to-server:
    needs: docker-publish
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
    - name: Execute Remote SSH Commands using Password/Key
      uses: appleboy/ssh-action@v0.1.10
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker pull ${{ env.DOCKER_HUB_USERNAME }}/fsd-backend:latest
          docker pull ${{ env.DOCKER_HUB_USERNAME }}/fsd-frontend:latest
          # Assuming docker-compose is placed at ~/app/docker-compose.yml on the server
          cd ~/app
          docker-compose down
          docker-compose up -d
