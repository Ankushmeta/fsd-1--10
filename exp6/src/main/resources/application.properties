# ================================================================
#  APPLICATION PROPERTIES — FSD II Experiment 6
#  JPA & Hibernate Demo
# ================================================================

# ---------------------------------------------------------------
# ACTIVE PROFILE: H2 In-Memory (works out of the box, no setup)
# ---------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:fsd_exp6;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Web Console — visit http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

