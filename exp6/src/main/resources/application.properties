# ---------------------------------------------------------------
# HIBERNATE / JPA SETTINGS
# ---------------------------------------------------------------

# create-drop  : creates schema on startup, drops on exit (good for dev)
# update       : updates schema without dropping (for MySQL/PG in dev)
# validate     : validates schema matches entities (for production)
# none         : do nothing
spring.jpa.hibernate.ddl-auto=create-drop

# Show generated SQL in console
spring.jpa.show-sql=true

# Pretty-print the SQL
spring.jpa.properties.hibernate.format_sql=true

# Show bind parameters (H2 / MySQL compatible)
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Hibernate statistics (shows query counts, cache usage etc.)
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG

# ---------------------------------------------------------------
# SERVER
# ---------------------------------------------------------------
server.port=8082
spring.application.name=exp6-jpa-demo
